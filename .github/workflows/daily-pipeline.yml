name: Daily Content Pipeline

# Runs every day at 06:00 UTC (07:00 BST / 08:00 BST in summer).
# Adjust cron to your timezone. https://crontab.guru/
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI
    inputs:
      provider:
        description: "Override provider for this run (groq/mistral/gemini/ollama-skip)"
        required: false
        default: ""
      stage_from:
        description: "Run from this stage onward (scout/strategist/writer/gate/visual/scheduler)"
        required: false
        default: "scout"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # required so the workflow can commit outputs back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_cron.txt

      - name: Run pipeline
        env:
          # Cloud LLM keys (set in repo Settings → Secrets → Actions)
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional Scout extras
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: RoyalPopBot/1.0
          # Force ollama off — no local model on runner
          PWS_PROVIDER_OVERRIDE: ${{ github.event.inputs.provider }}
        run: |
          cd "${{ github.workspace }}"
          if [ -n "${{ github.event.inputs.stage_from }}" ]; then
            python run_pipeline.py --from "${{ github.event.inputs.stage_from }}"
          else
            python run_pipeline.py
          fi

      - name: Commit outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "pipeline run $DATE [skip ci]"
            git push
          fi

      - name: Upload outputs as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs-${{ github.run_id }}
          path: outputs/
          retention-days: 30
